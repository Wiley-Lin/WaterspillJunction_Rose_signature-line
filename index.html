<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: Georgia, serif; overflow: hidden; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 24px 24px 40px; }
  .author {
    border-top: 1px solid #3A3028;
    padding-top: 32px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 2px solid #C49A3C;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: Georgia, serif;
    font-size: 18px;
    color: #C49A3C;
  }
  .author-text h4 {
    font-family: Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    color: #F5F0E8;
    margin-bottom: 4px;
  }
  .author-text p {
    font-size: 13px;
    color: #9A8A78;
    line-height: 1.6;
    margin: 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="author">
    <div class="avatar">RW</div>
    <div class="author-text">
      <h4>Rose Weaver</h4>
      <p>Playwright, actress, and singer. MFA in Playwriting, Brown University. Honorary Doctor of Fine Arts, Marymount Manhattan College.</p>
    </div>
  </div>
</div>
</body>
</html>
